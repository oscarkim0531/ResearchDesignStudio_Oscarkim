<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive of Termination Terms</title>
    <link rel="stylesheet" href="./style-archive.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <main id="archive-canvas">
        <div id="brand-cloud">
            <p class="loading-status">SCANNING SERVICES...</p>
        </div>
    </main>

    <script>
        const SPREADSHEET_ID = "1VzerbOerqPiRTUyM7YSOhHmLmkvMyhdFJ77gH2Xyqeg";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

        const KEYS = {
            serviceName: "Service Name",
            difficulty: "Difficulty",
            fullTerms: "Full Terms",
            sourceUrl: "Source URL",
            category: "Category",
            mediaType: "Media Type",
            ownershipType: "Ownership Type",
            launchDate: "Launch Date",
            region: "Region",
            targetAudience: "Target Audience",
            marketShare: "Market Share",
            billingCycle: "Billing Cycle",
            pricing: "Pricing (Monthly)"
        };

        async function loadArchive() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = parseCSV(text);
                renderBrandCloud(rows);
            } catch (error) {
                console.error("Data Load Error:", error);
            }
        }

        function parseCSV(text) {
            const rows = [];
            let currentLine = "";
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') inQuotes = !inQuotes;
                if (char === '\n' && !inQuotes) {
                    rows.push(currentLine);
                    currentLine = "";
                } else {
                    currentLine += char;
                }
            }
            if (currentLine) rows.push(currentLine);
            const headers = splitCSVLine(rows[0]).map(h => h.trim().replace(/"/g, ''));
            return rows.slice(1).map(line => {
                const values = splitCSVLine(line);
                const obj = {};
                headers.forEach((h, i) => {
                    obj[h] = (values[i] || "").trim().replace(/"/g, '');
                });
                return obj;
            });
        }

        function splitCSVLine(line) {
            const result = [];
            let current = "";
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') inQuotes = !inQuotes;
                else if (ch === "," && !inQuotes) {
                    result.push(current);
                    current = "";
                } else {
                    current += ch;
                }
            }
            result.push(current);
            return result;
        }

        function renderBrandCloud(rows) {
            const cloud = document.getElementById("brand-cloud");
            cloud.innerHTML = "";

            const shuffledRows = rows.filter(r => r[KEYS.serviceName]).sort(() => Math.random() - 0.5);

            shuffledRows.forEach(row => {
                const brandWrapper = document.createElement("div");
                const difficulty = row[KEYS.difficulty];
                
                brandWrapper.className = `brand-item diff-${difficulty}`;
                
                // 난이도에 따른 폰트 사이즈 클래스 (CSS에서 정의)
                let sizeLevel = "small";
                if (difficulty === "어려움") sizeLevel = "large";
                else if (difficulty === "보통") sizeLevel = "medium";

                brandWrapper.innerHTML = `
                    <div class="name-container">
                        <span class="brand-name size-${sizeLevel}">${row[KEYS.serviceName]}</span>
                        <div class="hover-popup">
                            <button class="popup-btn archive-btn" onclick="openDetailModal('${encodeURIComponent(JSON.stringify(row))}')">ARCHIVE</button>
                            <a href="${row[KEYS.sourceUrl]}" target="_blank" class="popup-btn source-link">SOURCE ↗</a>
                        </div>
                    </div>
                `;

                cloud.appendChild(brandWrapper);
            });
        }

        function openDetailModal(encodedRow) {
            const row = JSON.parse(decodeURIComponent(encodedRow));
            const modal = document.createElement("div");
            modal.className = "modal-overlay";
            
            modal.innerHTML = `
                <div class="modal-window">
                    <div class="modal-header">
                        <div class="modal-meta"></div>
                        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
                    </div>
                    
                    <div class="modal-content">
                        <div class="content-left">
                            <h1 class="modal-title">${row[KEYS.serviceName]}</h1>

                            <div class="difficulty-hero status-${row[KEYS.difficulty]}">
                                <span class="diff-label">TERMINATION DIFFICULTY</span>
                                <span class="diff-value">${row[KEYS.difficulty]}</span>
                            </div>
                            
                            <div class="data-table">
                                <div class="data-row"><span class="label">Category</span><span class="value">${row[KEYS.category]}</span></div>
                                <div class="data-row"><span class="label">Media Type</span><span class="value">${row[KEYS.mediaType]}</span></div>
                                <div class="data-row"><span class="label">Ownership</span><span class="value">${row[KEYS.ownershipType]}</span></div>
                                <div class="data-row"><span class="label">Launch Date</span><span class="value">${row[KEYS.launchDate]}</span></div>
                                <div class="data-row"><span class="label">Region</span><span class="value">${row[KEYS.region]}</span></div>
                                <div class="data-row"><span class="label">Target</span><span class="value">${row[KEYS.targetAudience]}</span></div>
                                <div class="data-row"><span class="label">Market Share</span><span class="value">${row[KEYS.marketShare]}</span></div>
                                <div class="data-row"><span class="label">Billing Cycle</span><span class="value">${row[KEYS.billingCycle]}</span></div>
                                <div class="data-row"><span class="label">Pricing</span><span class="value">${row[KEYS.pricing]}</span></div>
                                <div class="data-row"><span class="label">Difficulty</span><span class="value">${row[KEYS.difficulty]}</span></div>
                            </div>

                            <div class="source-box">
                                <span class="box-label">SOURCE AUTHENTICATION</span>
                                <a href="${row[KEYS.sourceUrl]}" target="_blank" class="main-source-link">ACCESS ORIGINAL DOCUMENT ↗</a>
                            </div>
                        </div>

                        <div class="content-right">
                            <div class="terms-viewer">
                                <div class="viewer-header">FULL TERMS DOCUMENTATION</div>
                                <div class="terms-text">${row[KEYS.fullTerms]}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            // ESC 키로 닫기 이벤트 추가
            const escListener = (e) => {
                if (e.key === 'Escape') {
                    modal.remove();
                    document.removeEventListener('keydown', escListener);
                }
            };
            document.addEventListener('keydown', escListener);
        }

        window.onload = loadArchive;
    </script>
</body>
</html>
