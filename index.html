<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancellation Terms Archive | Research Design Studio</title>
    <link rel="stylesheet" href="./style.css" type="text/css" media="all">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <meta name="description" content="Visualizing the 'evaporating time' hidden behind dark patterns. An inquiry into the legitimacy of readability in subscription economies.">
    <meta name="author" content="OscarKim">
    <link rel="icon" href="./Cancellation-Terms_Favicon.png" type="image/png">
</head>
<body class="dark-mode">

    <nav class="top-nav">
        <div class="nav-left">
            <h1 class="logo">CANCELLATION TERMS</h1>
            <div class="mode-switch">
                <button id="btn-loop" class="active">ENDLESS LOOP</button>
                <button id="btn-archive">ARCHIVE</button>
            </div>
        </div>
        <div class="nav-right">
            <button id="btn-about">ABOUT</button>
        </div>
    </nav>

    <main>
        <section id="section-loop" class="content-section">
            <div id="loop-container">
                <p class="placeholder-text">LOADING ENDLESS TERMS...</p>
            </div>
        </section>

        <section id="section-archive" class="content-section hidden">
            <div id="grid">
                </div>
        </section>
    </main>

    <div id="about-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Project Description</h2>
            <p>Visualizing the 'evaporating time' hidden behind dark patterns...</p>
        </div>
    </div>

    <script>
        // 탭 전환 및 모달 제어 기본 스크립트
        const btnLoop = document.getElementById('btn-loop');
        const btnArchive = document.getElementById('btn-archive');
        const btnAbout = document.getElementById('btn-about');
        const sectionLoop = document.getElementById('section-loop');
        const sectionArchive = document.getElementById('section-archive');
        const modal = document.getElementById('about-modal');
        const closeBtn = document.querySelector('.close-button');

        // Loop 버튼 클릭
        btnLoop.onclick = () => {
            btnLoop.className = 'active';
            btnArchive.className = '';
            sectionLoop.classList.remove('hidden');
            sectionArchive.classList.add('hidden');
        };

        // Archive 버튼 클릭
        btnArchive.onclick = () => {
            btnArchive.className = 'active';
            btnLoop.className = '';
            sectionArchive.classList.remove('hidden');
            sectionLoop.classList.add('hidden');
        };

        // About 모달 제어
        btnAbout.onclick = () => modal.classList.remove('hidden');
        closeBtn.onclick = () => modal.classList.add('hidden');
        window.onclick = (event) => {
            if (event.target == modal) modal.classList.add('hidden');
        };
    </script>
</body>
</html>
