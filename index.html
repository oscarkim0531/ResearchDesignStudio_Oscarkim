<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancellation Terms Archive | Research Design Studio</title>
    <link rel="stylesheet" href="./style.css" type="text/css" media="all">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <meta name="description" content="Extorting Time: The Architecture of Unreadability.">
    <meta name="author" content="OscarKim">
    <link rel="icon" href="./ Cancellation-Terms_Favicon.png" type="image/png">
</head>
<body class="dark-mode">

    <nav class="top-nav">
        <div class="nav-left">
            <h1 class="logo">CANCELLATION TERMS</h1>
            <div class="mode-switch">
                <button id="btn-trace">TRACE</button>
                <!-- <button id="btn-loop">LOOP</button> -->
                <button id="btn-archive">ARCHIVE</button>
            </div>
        </div>
        <div class="nav-right">
            <button id="btn-about">ABOUT</button>
        </div>
    </nav>

    <main>
        <section id="section-opening" class="content-section">
            <iframe src="./opening.html" id="opening-frame" frameborder="0"></iframe>
        </section>

        <section id="section-trace" class="content-section hidden">
            <iframe src="./trace-system.html" id="trace-frame" frameborder="0"></iframe>
        </section>

        <!-- <section id="section-loop" class="content-section hidden">
            <iframe src="./endless-loop.html" id="loop-frame" frameborder="0"></iframe>
        </section> -->

        <section id="section-text" class="content-section hidden">
            <iframe src="./text.html" id="text-frame" frameborder="0"></iframe>
        </section>

        <section id="section-archive" class="content-section hidden">
            <iframe src="./archive.html" id="archive-frame" frameborder="0"></iframe>
        </section>
    </main>

    <div id="about-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <p>우리는 서비스를 해지하기 위해 수많은 약관을 마주하지만, 정작 그 내용을 읽는 경우는 드뭅니다. 해지 과정은 버튼을 쫓는 단순한 반복 행위로 치환되고, 그 사이 우리가 동의한 수많은 조항은 무관심 속에 지나쳐집니다. <br>이 프로젝트는 구독 서비스의 해지 약관들을 수집하여 기록합니다. 사용자가 해지 버튼을 찾기 위해 보낸 시간과 무심코 동의한 문장들을 나열함으로써, 우리가 당연하게 여겼던 해지 과정의 실태를 객관적으로 보여주고자 합니다.</p>
        </div>
    </div>

    <script>
        const sections = {
            opening: document.getElementById('section-opening'),
            trace: document.getElementById('section-trace'),
            text: document.getElementById('section-text'),
            archive: document.getElementById('section-archive')
        };

        // 1. 안내 문구 애니메이션 및 시스템 시작 제어
        function runSystemGuide() {
            const guideWrapper = document.createElement('div');
            guideWrapper.id = 'system-guide-overlay';
            document.body.appendChild(guideWrapper);

            const messages = [
                "구독 중인 서비스를 해지하기 위해 '해지하기' 버튼을 찾아 헤맸던 경험이 있나요?",
                "우리는 필요에 의해 구독하고, 필요가 다하면 해지를 시도합니다.",
                "이제 이 서비스를 해지해 보세요."
            ];

            let delay = 0;
            messages.forEach((msg, i) => {
                setTimeout(() => {
                    const p = document.createElement('p');
                    p.className = 'guide-text';
                    p.innerText = msg;
                    guideWrapper.appendChild(p);
                    
                    // 3초 후 문구 사라짐
                    setTimeout(() => { p.classList.add('fade-out'); }, 4000);
                }, delay);
                delay += 5000;
            });

            // 모든 문구가 끝난 뒤 (delay 시점)
            setTimeout(() => {
                guideWrapper.innerHTML = ''; // 화면 비우기 (Empty Space 시작)
                
                // 1.5초간 검은 화면 유지 후 Trace 섹션 활성화
                setTimeout(() => {
                    guideWrapper.remove();
                    showSection('trace');
                    const traceFrame = document.getElementById('trace-frame').contentWindow;
                    traceFrame.postMessage('start-trace', '*');
                }, 1500);
            }, delay);
        }

        // 2. 메시지 수신 로직
        window.addEventListener('message', (event) => {
            if (event.data === 'opening-finished') {
                runSystemGuide(); 
            }
            if (event.data === 'go-to-text') {
                showSection('text');
                document.getElementById('text-frame').src = document.getElementById('text-frame').src;
            }
            if (event.data === 'go-to-archive') {
                showSection('archive');
            }
        });

        const buttons = {
            trace: document.getElementById('btn-trace'),
            archive: document.getElementById('btn-archive')
        };

        function showSection(targetKey) {
            Object.values(sections).forEach(sec => {
                if (sec) sec.classList.add('hidden');
            });
            Object.values(buttons).forEach(btn => {
                if (btn) btn.classList.remove('active');
            });

            if (sections[targetKey]) {
                sections[targetKey].classList.remove('hidden');
            }
            if (buttons[targetKey]) {
                buttons[targetKey].classList.add('active');
            }
        }

        if (buttons.trace) buttons.trace.onclick = () => showSection('trace');
        if (buttons.archive) buttons.archive.onclick = () => showSection('archive');

        const btnAbout = document.getElementById('btn-about');
        const modal = document.getElementById('about-modal');
        const closeBtn = document.querySelector('.close-button');
        if (btnAbout) btnAbout.onclick = () => modal.classList.remove('hidden');
        if (closeBtn) closeBtn.onclick = () => modal.classList.add('hidden');
    </script>
</body>
</html>
