<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancellation Terms_Research Design Studio(1)</title>
    <link rel="stylesheet" href="/style.css" type="text/css" media="all">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <meta
        name="description"
        content="Visualizing the 'evaporating time' hidden behind dark patterns. 
        An inquiry into the legitimacy of readability in subscription economies."
    >
    <meta name="author" content="OscarKim">
</head>
<body>

    <header class="global-status">
        <div class="status-left">
            <span class="label">ELAPSED TIME</span>
            <span id="global-timer">00:00:00</span>
        </div>
        
        <div class="status-center">
            <nav class="step-indicator">
                <span class="step active" data-step="1">SEARCH</span>
                <span class="step" data-step="2">INFILTRATE</span>
                <span class="step" data-step="3">PERSUADE</span>
                <span class="step" data-step="4">DETACH</span>
            </nav>
        </div>

        <div class="status-right">
            <span class="label">DATA CAPTURED</span>
            <span id="data-count">17 / 52</span>
        </div>
    </header>

    <main id="main-canvas">
        <section class="intro-section">
            <h1 class="hero-title">당신의 시간은<br>기업의 <span class="dim">이익</span>이 됩니다.</h1>
            <p class="hero-sub">우리는 52개 서비스의 해지 약관 속에서 휘발된 0.73%의 가독성을 추적합니다.</p>
            <button class="start-btn">EXPLORE ARCHIVE</button>
        </section>
        
        <div id="content-loader"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
